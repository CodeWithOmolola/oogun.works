
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.aw{display:flex;justify-content:center;padding:1rem 0;font-family:'DM Sans',sans-serif;}
.ad{width:100%;max-width:580px;background:#0a0a0a;border-radius:18px;overflow:hidden;border:2px solid #222;position:relative;}
.top{display:flex;min-height:235px;background:#1a72c4;}
.left{flex:1.05;padding:12px 10px;border-right:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:white;line-height:1.2;letter-spacing:0.04em;}
.tweet-stage{flex:1;position:relative;overflow:hidden;border-radius:8px;min-height:110px;}
.tc{position:absolute;inset:0;background:white;border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:3px;opacity:0;transform:translateY(14px);transition:opacity 0.5s ease,transform 0.5s ease;pointer-events:none;}
.tc.vis{opacity:1;transform:translateY(0);}
.tc.out{opacity:0;transform:translateY(-10px);}
.th{font-size:9.5px;font-weight:600;color:#1a72c4;display:flex;align-items:center;gap:4px;}
.th span{color:#777;font-weight:400;}
.tb{font-size:10px;color:#222;line-height:1.4;flex:1;}
.ti{width:100%;height:52px;object-fit:cover;border-radius:5px;margin-top:2px;}
.ti-placeholder{width:100%;height:52px;border-radius:5px;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.7);}
.tf{font-size:9px;color:#1a72c4;font-weight:500;cursor:pointer;background:#e8f0fe;border-radius:4px;padding:2px 7px;display:inline-block;margin-top:auto;align-self:flex-start;}
.dots{display:flex;gap:4px;justify-content:center;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);transition:background 0.3s;}
.dot.on{background:white;}
.right{flex:1;padding:10px 10px 8px 12px;display:flex;flex-direction:column;overflow:hidden;}
.sbar{font-size:9px;color:rgba(255,255,255,0.75);text-align:right;font-family:'Space Mono',monospace;margin-bottom:6px;flex-shrink:0;}
.cw{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:5px;overflow:hidden;min-height:0;}
.msg{border-radius:10px;padding:6px 9px;font-size:10px;line-height:1.35;max-width:95%;transition:opacity 0.4s ease,transform 0.4s ease;opacity:0;transform:translateY(8px);}
.msg.show{opacity:1;transform:translateY(0);}
.msg.fade{opacity:0;transform:translateY(-6px);}
.mu{background:rgba(255,255,255,0.95);color:#111;align-self:flex-start;}
.ma{background:rgba(255,255,255,0.22);color:white;align-self:flex-end;}
.mr{background:white;color:#111;align-self:flex-end;padding:6px 8px;}
.rn{font-weight:600;font-size:10px;color:#1a72c4;margin-bottom:1px;}
.rs{font-size:9px;color:#555;line-height:1.3;}
.rl{font-size:8.5px;color:#1a72c4;text-decoration:underline;display:block;margin-top:2px;cursor:pointer;}
.sh{font-size:9px;color:rgba(255,255,255,0.45);text-align:center;padding:4px 0 0;font-style:italic;flex-shrink:0;}
.bot{background:#1a72c4;border-top:2px solid #0a0a0a;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;}
.kw{flex:1;}
.ib{background:rgba(255,255,255,0.15);border-radius:6px;padding:5px 8px;font-size:11px;color:white;min-height:24px;margin-bottom:5px;display:flex;align-items:center;word-break:break-all;}
.cur{display:inline-block;width:1.5px;height:13px;background:white;animation:blink 1s infinite;vertical-align:middle;margin-left:1px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.kr{display:flex;gap:4px;margin-bottom:4px;justify-content:center;}
.k{background:white;color:#111;border-radius:4px;width:26px;height:26px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s,transform 0.08s;flex-shrink:0;user-select:none;}
.k:active{transform:scale(0.9);}
.k.wide{width:auto;padding:0 8px;flex:1;min-width:90px;}
.k.gray{background:#b0b0b0;}
.k.blue{background:#2f6fb8;color:white;}
.sc{display:flex;flex-direction:column;gap:8px;align-items:center;}
.tp{width:72px;height:52px;background:#777;border-radius:6px;border:1px solid rgba(255,255,255,0.2);}
.sbtn{width:38px;height:38px;background:#2a2a2a;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #444;transition:background 0.15s,transform 0.1s;position:relative;z-index:30;}
.sbtn:hover{background:#3a3a3a;}
.sbtn:active{transform:scale(0.92);}
.sbtn svg{width:16px;height:16px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.ov{position:absolute;top:0;left:0;right:0;bottom:62px;background:rgba(14,55,115,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity 0.3s;border-radius:16px 16px 0 0;}
.ov.on{opacity:1;}
.ring{width:62px;height:62px;border:3px solid rgba(255,255,255,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:10px;transition:transform 0.1s;}
.ring.pop{animation:pop 0.25s ease;}
@keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.sct{font-size:22px;color:white;font-family:'Space Mono',monospace;font-weight:700;}
.scs{font-size:10px;color:rgba(255,255,255,0.65);margin-top:6px;text-align:center;line-height:1.5;max-width:180px;}
.mpills{display:flex;gap:6px;margin-top:10px;}
.mp{font-size:9px;border-radius:12px;padding:3px 10px;font-weight:600;border:1.5px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;transition:all 0.25s;}
.mp.on{border-color:white;color:white;background:rgba(255,255,255,0.18);}
.askbtn{margin-top:14px;background:white;color:#1a72c4;border:none;border-radius:20px;padding:7px 24px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;opacity:0.3;pointer-events:none;transition:opacity 0.25s;}
.askbtn.ready{opacity:1;pointer-events:all;}
.cue{font-size:9px;color:rgba(255,255,255,0.4);margin-top:8px;font-style:italic;}
</style>

<div class="aw">
<div class="ad" id="dev">

  <div class="ov" id="ov">
    <div class="ring" id="ring">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </div>
    <div class="sct" id="sct">× 0</div>
    <div class="scs" id="scs">click shake button below to count</div>
    <div class="mpills">
      <div class="mp" id="p2">× 2 = X insights</div>
      <div class="mp" id="p3">× 3 = Google facts</div>
    </div>
    <button class="askbtn" id="askbtn">Ask Allude</button>
    <div class="cue" id="cue">keep clicking shake ↓</div>
  </div>

  <div class="top">
    <div class="left">
      <div class="logo">ASK<br>ALLUDE</div>
      <div class="tweet-stage" id="ts"></div>
      <div class="dots" id="dr"></div>
    </div>
    <div class="right">
      <div class="sbar" id="sbar"></div>
      <div class="cw" id="cw"></div>
      <div class="sh">shake or type to ask allude ↑</div>
    </div>
  </div>

  <div class="bot">
    <div class="kw">
      <div class="ib"><span id="kbt"></span><span class="cur"></span></div>
      <div id="kb"></div>
    </div>
    <div class="sc">
      <div class="tp"></div>
      <button class="sbtn" id="shakeBtn">
        <svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      </button>
      <button class="sbtn" id="sendBtn">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>
</div>

<script>
(function(){

const tweets=[
  {h:'@beyoncegarden',s:'· 2m',b:'even APPLE MUSIC knows beyoncé\'s best work is lemonade, ICONIC 😭😭😭',img:'https://upload.wikimedia.org/wikipedia/en/5/53/Beyonce_-_Lemonade_%28Album%29.png'},
  {h:'@musicnerds_x',s:'· 5m',b:'The Renaissance tour visuals were on another level. Art direction completely unmatched 🎨',img:'https://upload.wikimedia.org/wikipedia/en/a/af/Beyonce_-_Renaissance_%28Official_Album_Cover%29.png'},
  {h:'@genzcultural',s:'· 11m',b:'no one is merging AI and music discovery like this and it shows 👀 allude is different',img:null},
  {h:'@techfeed_x',s:'· 18m',b:'Google x X collab for a device that speaks Gen Z? About time 🔥 #AI',img:null},
  {h:'@ambientshift',s:'· 24m',b:'The future of AI is ambient, not screen-based. Shake to ask is the natural next step 🤝',img:null},
];

const xR=[
  'X trending: "Allude" — 38K posts in 6 hours 🔥',
  'Social pulse: 94% of X users want ambient AI over screen-based',
  'Top X sentiment: people want AI that feels human, not robotic 💬',
  'Breaking on X: Google x X device pre-orders up 220% this week',
];
const gR=[
  {n:'Ambient Computing',s:'A paradigm where computing is embedded in everyday objects, removing the need for screens.'},
  {n:'Voice-First AI',s:'AI systems designed for hands-free interaction — pioneered by Google Assistant, now evolving fast.'},
  {n:'Gen Z Tech Behavior',s:'72% of Gen Z prefer AI that integrates with social platforms as their primary info source. (Pew 2024)'},
  {n:'Magic 8 Ball (design heritage)',s:'Invented in 1950. The shake-to-answer interaction model has remained culturally intuitive for 70+ years.'},
];
const tR=[
  {q:'weather',a:{t:'plain',v:'Sunny, 75°F with clear skies all day ☀️'}},
  {q:'beyonc',a:{t:'rich',n:'Beyoncé',s:'Singer-songwriter & entrepreneur. Renaissance World Tour grossed $580M globally.'}},
  {q:'allude',a:{t:'plain',v:'Shake ×2 for X social insights, ×3 for Google knowledge base facts.'}},
  {q:'music',a:{t:'rich',n:'Top Artist: Beyoncé',s:'Renaissance Act II debuted #1 in 47 countries. Most streamed artist of 2024.'}},
  {q:'google',a:{t:'rich',n:'Google AI',s:'Google contributes its knowledge graph and Gemini AI to power Allude\'s factual responses.'}},
  {q:'twitter',a:{t:'plain',v:'X (formerly Twitter) powers Allude\'s real-time social feed and trending insights.'}},
  {q:'help',a:{t:'plain',v:'Type any question and press return — or use the shake button for social + AI insights.'}},
];
function getTR(q){const lq=q.toLowerCase();for(const r of tR){if(lq.includes(r.q))return r.a;}return{t:'plain',v:'Searching X and Google for "'+q+'"... Found '+Math.floor(Math.random()*800+100)+' posts.'};}

let tIdx=0, typed='', shakeCount=0, overlayOpen=false;

const tsEl=document.getElementById('ts');
const drEl=document.getElementById('dr');
const cwEl=document.getElementById('cw');
const kbtEl=document.getElementById('kbt');
const ovEl=document.getElementById('ov');
const ringEl=document.getElementById('ring');
const sctEl=document.getElementById('sct');
const scsEl=document.getElementById('scs');
const askBtn=document.getElementById('askbtn');
const p2El=document.getElementById('p2');
const p3El=document.getElementById('p3');
const sbarEl=document.getElementById('sbar');
const shakeBtn=document.getElementById('shakeBtn');
const sendBtn=document.getElementById('sendBtn');

function updateTime(){const n=new Date();let h=n.getHours(),m=n.getMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;sbarEl.textContent=h+':'+(m<10?'0'+m:m)+' '+ap+' ▲▲▲';}
updateTime();setInterval(updateTime,30000);

tweets.forEach((t,i)=>{
  const d=document.createElement('div');
  d.className='tc'+(i===0?' vis':'');
  let imgHtml='';
  if(t.img){
    imgHtml=`<img class="ti" src="${t.img}" onerror="this.style.display='none'" alt="">`;
  }
  d.innerHTML=`<div class="th"><svg width="10" height="10" viewBox="0 0 24 24" fill="#1a72c4"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.736-8.857L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>${t.h} <span>${t.s}</span></div><div class="tb">${t.b}</div>${imgHtml}<div class="tf">View on X →</div>`;
  tsEl.appendChild(d);
  const dot=document.createElement('div');dot.className='dot'+(i===0?' on':'');drEl.appendChild(dot);
});

function cycleTweet(){
  const cards=[...tsEl.querySelectorAll('.tc')];
  const dots=[...drEl.querySelectorAll('.dot')];
  cards[tIdx].classList.add('out');
  setTimeout(()=>{
    cards[tIdx].classList.remove('vis','out');
    dots[tIdx].classList.remove('on');
    tIdx=(tIdx+1)%tweets.length;
    cards[tIdx].classList.add('vis');
    dots[tIdx].classList.add('on');
  },480);
}
setInterval(cycleTweet,3500);

const MAX_MSGS=3;

function getMessages(){return [...cwEl.querySelectorAll('.msg')];}

function pruneIfNeeded(){
  const msgs=getMessages();
  if(msgs.length>=MAX_MSGS){
    const oldest=msgs[0];
    oldest.classList.add('fade');
    setTimeout(()=>oldest.remove(),400);
  }
}

function addMsg(content,cls,delay){
  return new Promise(res=>{
    setTimeout(()=>{
      pruneIfNeeded();
      setTimeout(()=>{
        const el=document.createElement('div');
        el.className='msg '+cls;
        if(cls==='mr'){
          el.innerHTML=`<div class="rn">${content.n}</div><div class="rs">${content.s}</div><span class="rl">Read more on Google →</span>`;
        } else {
          el.textContent=content;
        }
        cwEl.appendChild(el);
        void el.offsetWidth;
        el.classList.add('show');
        res(el);
      },120);
    },delay||0);
  });
}

setTimeout(()=>addMsg('What is the weather today?','mu',400),0);
setTimeout(()=>addMsg('Sunny and warm, 75°F today ☀️','ma',0),1300);

const kbRows=[
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['⇧','z','x','c','v','b','n','m','⌫'],
  ['123','🎤','space','return']
];
const kbEl=document.getElementById('kb');
kbRows.forEach(keys=>{
  const row=document.createElement('div');row.className='kr';
  keys.forEach(k=>{
    const btn=document.createElement('button');btn.className='k';btn.textContent=k;
    if(k==='space'){btn.classList.add('wide');}
    if(['⇧','⌫','123','🎤'].includes(k))btn.classList.add('gray');
    if(k==='return')btn.classList.add('blue');
    btn.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      if(k==='⌫')typed=typed.slice(0,-1);
      else if(k==='space')typed+=' ';
      else if(k==='return'){submitTyped();return;}
      else if(['⇧','123','🎤'].includes(k))return;
      else typed+=k;
      kbtEl.textContent=typed;
    });
    row.appendChild(btn);
  });
  kbEl.appendChild(row);
});

function submitTyped(){
  if(!typed.trim())return;
  const q=typed.trim();typed='';kbtEl.textContent='';
  addMsg(q,'mu',0);
  const resp=getTR(q);
  setTimeout(()=>{
    if(resp.t==='rich')addMsg({n:resp.n,s:resp.s},'mr',0);
    else addMsg(resp.v,'ma',0);
  },950);
}

sendBtn.addEventListener('click',e=>{e.stopPropagation();submitTyped();});

function openOverlay(){
  shakeCount=0;overlayOpen=true;
  ovEl.classList.add('on');
  sctEl.textContent='× 0';
  scsEl.textContent='click the shake button below to count';
  p2El.classList.remove('on');p3El.classList.remove('on');
  askBtn.classList.remove('ready');
  document.getElementById('cue').style.opacity='0.4';
}

function doShake(){
  if(shakeCount>=3)return;
  shakeCount++;
  ringEl.classList.remove('pop');
  void ringEl.offsetWidth;
  ringEl.classList.add('pop');
  sctEl.textContent='× '+shakeCount;
  const dev=document.getElementById('dev');
  dev.style.transition='transform 0.08s';
  dev.style.transform=shakeCount%2===0?'rotate(-2deg)':'rotate(2deg)';
  setTimeout(()=>{dev.style.transform='';},110);
  if(shakeCount===1){scsEl.textContent='one more for X insights, keep going for Google...';}
  if(shakeCount===2){scsEl.textContent='×2 ready — X social insights unlocked';p2El.classList.add('on');askBtn.classList.add('ready');}
  if(shakeCount===3){scsEl.textContent='×3 ready — Google knowledge base unlocked';p3El.classList.add('on');document.getElementById('cue').style.opacity='0';}
}

shakeBtn.addEventListener('click',e=>{
  e.stopPropagation();
  if(!overlayOpen){openOverlay();}
  else{doShake();}
});

askBtn.addEventListener('click',e=>{
  e.stopPropagation();
  overlayOpen=false;
  ovEl.classList.remove('on');
  if(shakeCount>=3){
    const r=gR[Math.floor(Math.random()*gR.length)];
    addMsg('Google search...','mu',0);
    setTimeout(()=>addMsg({n:r.n,s:r.s},'mr',0),950);
  } else {
    const r=xR[Math.floor(Math.random()*xR.length)];
    addMsg("What's trending on X?","mu",0);
    setTimeout(()=>addMsg(r,'ma',0),900);
    cycleTweet();
  }
  shakeCount=0;
});

})();
</script>
